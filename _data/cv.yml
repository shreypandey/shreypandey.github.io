    - title: Research Fellow
      institution: <b><a href="https://www.microsoft.com/en-us/research/lab/microsoft-research-india/">Microsoft Research</a></b>
      year: Jan 2024 - May 2025
      location: Bengaluru, India
      maindescription: Worked across the LLM stack on AI-assisted programming and agentic systems for the public good.
      description:
        - title: <b>Auto Azure SDK Migration</b>
          contents:
            - Developed an LLM-based framework to automate migration of Azure SDK code to the latest API version, achieving a 50% reduction in engineering effort and saving 30 person-months annually.
            - Leveraged a hybrid approach combining symbolic code-graph analysis with LLM workflows and a refined knowledge base to streamline code generation.
        - title: <a href="https://www.microsoft.com/en-us/research/project/pwr/"><b>Programming with Representations (PwR)</b></a>
          contents:
            - Designed PwR, an AI-assisted programming system enabling non-profits without in-house engineering teams to build and maintain custom software by describing requirements in natural language.
            - Developed an LLM-based pipeline that transforms requirements into a custom domain-specific language (DSL), with a symbolic translation tool compiling the DSL into Python code. The DSL is also rendered as a visual workflow chart for transparency and easier iteration by non-technical users.
            - Open-sourced under the JugalBandi initiative and used as the foundation for JugalBandi's chatbot use cases. Code at <a href="https://github.com/microsoft/PwR-Studio">microsoft/PwR-Studio</a>.
        - title: <a href="https://jugalbandi.studio/"><b>JugalBandi</b></a>
          contents:
            - Led JugalBandi, an initiative built on PwR enabling non-tech organizations to develop and deploy LLM-powered conversational bots. Featured in <b>Satya Nadella</b>'s keynote talks.
            - Led the design and development of <a href="https://github.com/OpenNyAI/Jugalbandi-Manager">JugalBandi-Manager</a>, a production runtime with a pluggable architecture for chat interfaces, LLM providers, vernacular language providers, and voice/TTS providers, with FSM-based conversation flows.
            - Contributed to <a href="https://github.com/OpenNyAI/Jugalbandi-Studio-Engine">JugalBandi-Studio</a>, a web-based platform that transforms plain-language requirements into custom chatbots.
            - Deployed at CPGRAMS, MySchemes, and Bandhu (housing), with the open-source platform adopted by additional government and civil society initiatives.
        - title: <b>Dialog Systems for Government Services</b>
          contents:
            - Designed LLM-based dialog systems for government agencies including the Ministry of Law and Justice, Prime Minister's Office, and NeGD, enhancing citizens' access to public services.
            - Built a dense retrieval pipeline with LLM-driven follow-up question generation to classify citizen queries against a 14,000+ form grievance taxonomy (CPGRAMS) and resolve ambiguity before filing.
            - Developed supporting components including query rewriting, semantic search, and conversational hierarchical RAG for document-grounded responses.
    - title: Senior Data Science Engineer
      institution: <b><a href="https://en.wikipedia.org/wiki/Myntra">Myntra</a></b>
      year: Apr 2023 - Jan 2024
      location: Bengaluru, India
      maindescription: My roles and responsibilities included, but not limited to, design and implementation of recommendation and search engines, scaling of various machine learning components and supporting product groups to enable various features across the platform.
      description:
        - title: <b>NNFetch - In House Vector Database</b>
          contents:
            - Created a dynamic recommendation platform, enhancing product discovery by blending metadata filters and partitioning with HNSW and ANNOY indexing for lightning-fast nearest product retrieval.
            - Empowered multiple data science projects with a pivotal recall set generator, adapting effortlessly to evolving metadata and delivering remarkable <b>throughput of 1M RPM</b> at a <b>peak P99 latency of 20ms</b>.
            - Delivered adaptive clustering logic, optimizing recall score and latency by extending existing indexes, enabling precise adaptation to diverse business use cases with rapidly changing metadata.
    - title: Data Science Engineer
      institution: <b><a href="https://en.wikipedia.org/wiki/Myntra">Myntra</a></b>
      year: Jun 2021 - Apr 2023
      location: Bengaluru, India
      description:
        - title: <b>Personalised Search Ranking</b>
          contents: 
            - Designed and developed a real-time, user-personalised search-ranking service, using long-term and short-term user features, query relevance, product attributes and dynamic product features in an XGBoost model optimised for CTR.
            - Engineered a high-performance solution for millions of users and products, leveraging Aerospike data store, SIMD-based cosine similarity processing, and ONNX Runtime for XGBoost model inferencing, delivering seamless operation at <b>500K RPM</b> with a remarkable <b>P99 latency of 30ms</b>.
            - Proven positive impact on business metrics through AB tests, enhancing user experience and relevance at scale.
        - title: <b>Recommendation System</b>
          contents:
            - Engineered a versatile framework for real-time product recommendations, leveraging embedding-based features and MCDA to optimize for relevance, personalization, and real-time business metrics, and using Determinantal Point Processes (DPP) to incorporate diversity in the recommendations.
            - Scaled the system to handle throughput of <b>5M RPM</b> with a <b>P99 latency of 40ms</b>, achieving a <b>19x latency reduction</b> and an <b>88% annual hardware cost savings</b> compared to the previous system.
        - title: <b>Machine Learning Scaling</b>
          contents:
            -  Built reusable components for scaling data science models by optimizing for latency and throughput. Maintaining compatibility by python, aligning with preferences of data scientists and easy to use with minimal code changes. Proposed solutions have been adopted to improve multiple data science services at Myntra.
            -  Engineered a memory-efficient solution, consolidating embedding vectors in shared memory to <b>reduce latency by 4.5x</b> and <b>reduce memory footprint by 6x</b>. Enhanced application throughput per node by enabling more worker processes per node.
            -  Introduced a high-performance approach using SIMD for calculating similarity scores and re-ranking, drastically cutting computation cycles and latency. The method handles up to <b>15x more traffic</b> while improving latency.
        - title: <b>Image Pose Detector</b>
          contents:
            -  Created an scalable online service for human pose detection from an image using a ResNet-18 model with custom layers. 
            -  Able to handle <b>27x more throughput</b> with a <b>6x reduction in latency</b> from its predecessor on a single node.
